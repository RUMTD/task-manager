name: CI/CD Pipeline - Task Manager

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

env:
  JAVA_VERSION: '17'
  DOCKER_IMAGE: deployfast/task-manager
  SONAR_PROJECT_KEY: RUMTD_task-manager

jobs:
  # ============================================================
  # JOB 1: Tests et analyse qualité (CI) → SonarCloud
  # Pas besoin de service PostgreSQL : les tests utilisent H2
  # en mémoire (voir application-test.yml)
  # ============================================================
  test-and-analyze:
    name: Tests & SonarCloud
    runs-on: ubuntu-latest

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Obligatoire pour SonarCloud

      - name: Configuration JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'

      - name: Cache des dépendances Maven
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      - name: Cache SonarCloud
        uses: actions/cache@v4
        with:
          path: ~/.sonar/cache
          key: ${{ runner.os }}-sonar
          restore-keys: ${{ runner.os }}-sonar

      - name: Compilation
        run: mvn compile -B

      - name: Exécution des tests avec couverture JaCoCo
        run: mvn test jacoco:report -B
        env:
          SPRING_PROFILES_ACTIVE: test

      - name: Vérification couverture minimale (60%)
        run: mvn jacoco:check -B

      - name: Publication des résultats de tests
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: Résultats JUnit
          path: target/surefire-reports/*.xml
          reporter: java-junit

      - name: Analyse SonarCloud
        run: |
          mvn sonar:sonar -B \
            -Dsonar.projectKey=${{ env.SONAR_PROJECT_KEY }} \
            -Dsonar.organization=${{ secrets.SONAR_ORGANIZATION }} \
            -Dsonar.host.url=https://sonarcloud.io \
            -Dsonar.token=${{ secrets.SONAR_TOKEN }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ============================================================
  # JOB 2: Sécurité DevSecOps
  # ============================================================
  security-scan:
    name: Scans de Sécurité
    runs-on: ubuntu-latest
    needs: test-and-analyze

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Configuration JDK
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'

      - name: Cache Maven
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}

      - name: Scan des dépendances (OWASP Dependency Check)
        run: |
          mvn org.owasp:dependency-check-maven:check -B \
            -DfailBuildOnCVSS=7 \
            -DsuppressionFile=.github/dependency-check-suppressions.xml
        continue-on-error: true

      - name: Détection de secrets (TruffleHog)
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}
          head: HEAD
          extra_args: --debug --only-verified

  # ============================================================
  # JOB 3: Déploiement → Docker Hub (CD)
  # ============================================================
  deploy:
    name: Déploiement → Docker Hub
    runs-on: ubuntu-latest
    needs: [test-and-analyze, security-scan]
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop'
    environment:
      name: ${{ github.ref == 'refs/heads/main' && 'production' || 'staging' }}
      url: https://hub.docker.com/r/deployfast/task-manager

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Connexion à Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extraction des métadonnées Docker (tag automatique)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.DOCKER_IMAGE }}
          tags: |
            type=ref,event=branch
            type=sha,prefix=sha-
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=semver,pattern={{version}}

      - name: Configuration Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build et push sur Docker Hub
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Scan de vulnérabilités de l'image (Trivy)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.DOCKER_IMAGE }}:latest
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'
          exit-code: '0'

      - name: Publication des résultats Trivy
        uses: github/codeql-action/upload-sarif@v2
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'

      - name: Résumé du déploiement
        run: |
          echo "### Déploiement réussi 🚀" >> $GITHUB_STEP_SUMMARY
          echo "**Image publiée :** ${{ env.DOCKER_IMAGE }}" >> $GITHUB_STEP_SUMMARY
          echo "**Tags :**" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "${{ steps.meta.outputs.tags }}" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "**Docker Hub :** https://hub.docker.com/r/deployfast/task-manager" >> $GITHUB_STEP_SUMMARY