# ============================================================
# Configuration SonarQube - Task Manager
# ============================================================

sonar.projectKey=deployfast_task-manager
sonar.projectName=Task Manager - DeployFast
sonar.projectVersion=1.0.0

# Encodage du code source
sonar.sourceEncoding=UTF-8

# Répertoires sources et tests
sonar.sources=src/main/java
sonar.tests=src/test/java

# Exclusions (pas d'analyse sur les classes générées / config)
sonar.exclusions=\
  **/model/enums/**,\
  **/*Application.java,\
  **/config/OpenApiConfig.java

# Rapport de couverture JaCoCo
sonar.coverage.jacoco.xmlReportPaths=target/site/jacoco/jacoco.xml

# Exclusions de couverture (DTOs, entités - code simple)
sonar.coverage.exclusions=\
  **/dto/**,\
  **/model/**,\
  **/*Application.java

# Qualité gate recommandée
# - Couverture >= 60%
# - Pas de bugs critiques
# - Pas de vulnérabilités
# - Duplication < 3%
